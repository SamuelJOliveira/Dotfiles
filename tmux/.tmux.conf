# -- general -------------------------------------------------------------------

# terminal color ajustment
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*:RGB"
# set-option -sa terminal-overrides ",xterm*Tc"
set-option -g status-keys vi
set -g mouse on

# Sane defaults
set-option -s escape-time 10              # faster command sequences
set-option -sg repeat-time 600            # increase repeat timeout
set-option -s focus-events on
set-option -g history-limit 5000          # boost history
set-option -g set-clipboard on            # use system clipboard

# tmux bar at the bottom
set-option -g status-position top

# Keybinding to reload config file
unbind r
bind-key r source-file ~/.config/tmux/tmux.conf \; display "~/.config/tmux/tmux.conf sourced!"

# Set tmux prefixes: C-a or C-b
set-option -g prefix C-a
set-option -g prefix2 C-b
# set-option -g prefix2 C-space
# unbind C-b # Default prefix.
bind-key C-a send-prefix



# -- display -------------------------------------------------------------------

set-option -g base-index 1    # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows
set-window-option -g pane-base-index 1

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-bg default
set -g status-style bg=default

# Yazi requirements for image preview to work correctly in tmux
# set -g allow-passthrough on
# set -ga update-environment TERM
# set -ga update-environment TERM_PROGRAM

# -- navigation ----------------------------------------------------------------


# Default sessions


# # find session
# bind-key C-f command-prompt -p find-session 'switch-client -t %%'

# Set easier window split keys
# split current window horizontally in current directory
bind-key '|' split-window -v -c "#{pane_current_path}"
# split current window vertically in current directory
bind-key '\' split-window -h -c "#{pane_current_path}"
# Open panes in current directory
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
# # Set easier window split keys
# bind-key v split-window -h
# bind-key h split-window -v

# New window in the same directory.
bind-key c new-window -c "#{pane_current_path}"
# Novo atalho - Ctrl-b Ctrl-t - abre na pasta da sessão
bind-key C-t new-window

# Synchronize panes
bind-key e set-window-option synchronize-panes\; display-message "synchronize mode toggled."

# Quit a single session.
# bind-key C-x kill-session
# Kill the tmux server.
bind-key C-x confirm-before -p "kill-session? (y/n)" kill-session

# Extra keybindings for jumping between panes.
# Remember: the oficial keybindins are C-{h,j,k,l} integrated with nvim.
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R
bind-key > swap-pane -D       # swap current pane with the next one
bind-key < swap-pane -U       # swap current pane with the previous one
# session navigation
# Go to previous Session: same as C-a (
# Go to next Session: same as C-a )
# bind-key -n C-S-h switch-client -p
# bind-key -n C-S-l switch-client -n
bind-key -r BTab switch-client -p  # move to last session
bind-key -r Tab switch-client -n                                    # move to last active window
bind-key -n C-BTab switch-client -p
bind-key -n C-Tab switch-client -n

# pane resizing
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2

# window navigation
# bind-key -r C-h previous-window                             # select previous window
# bind-key -r C-l next-window                                 # select next window
# bind-key -r C-S-H swap-window -t -1 \; select-window -t -1  # swap current window with the previous one
# bind-key -r C-S-L swap-window -t +1 \; select-window -t +1  # swap current window with the next one
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6

# Switch windows with Alt+{h,l} or Shift+{left,right}
bind-key -n M-h previous-window
bind-key -n M-l next-window
# bind-key -n S-Left previous-window
# bind-key -n S-Right next-window

# # Easily reorder windows with CTRL+SHIFT+Arrow
bind-key -n C-Left swap-window -t -1
bind-key -n C-Right swap-window -t +1

# create session
bind-key C-c new-session
# Create a detached nameless session.
# bind-key S new-session -d
# Create a detached session, but asks for a name for it.
bind-key S command-prompt -p "New named session:" "new-session -d -s '%%'"

# Select a section via dmenu.
bind-key s run-shell ~/.local/bin/tmux/tmux_switch_session.sh

# Session creation
bind-key f run-shell "tmux neww folder-selecion.sh"
bind-key D run-shell "folder-selecion.sh ~/Documents/"
bind-key V run-shell "folder-selecion.sh ~/.config/nvim/"
bind-key B run-shell "folder-selecion.sh ~/.local/bin/"


# -- copy mode -----------------------------------------------------------------

bind-key Enter copy-mode # enter copy mode

# copy/past vim style
# vim style navigation/copying.
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line

# -- buffers -------------------------------------------------------------------

# bind-key b list-buffers     # list paste buffers
bind-key p paste-buffer -p  # paste from the top paste buffer
# bind-key P choose-buffer    # choose which buffer to paste from

# With this enabled you can use <prefix> C-l to clear the screen.
bind-key C-l send-keys 'C-l'
bind-key l send-keys 'C-l'


# List of plugins
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'rose-pine/tmux'

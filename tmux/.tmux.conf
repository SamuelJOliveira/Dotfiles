#=====================[ Setting Up Statusbar ] ========================#
# Toggle status bar
bind-key b set -g status

# Configurar background e foreground da statusbar
set -g status-style bg=default,fg=#abb2bf

# Configurar border color between panes
set -g pane-active-border-style fg=#61afef    # active panes (blue)
set -g pane-border-style fg=#3e4451           # inactive panes (gray)

# Configurar o lado esquerdo
set -g status-left-length 50
set -g status-left "#{?client_prefix,#[fg=#e06c75#,bold],#[fg=#98c379#,bold]}󰙀  #S #(session_count=\$(tmux list-sessions | wc -l | tr -d ' '); [ \$session_count -gt 1 ] && echo \" (\$session_count)\") #[default]"

# Configurar o centro (janelas)
set -g window-status-current-format "#[fg=#61afef,bold]#I: (✓) #W#{?window_zoomed_flag, ,}#[default]"
set -g window-status-format "#[fg=#c678dd]#I: #W#{?window_zoomed_flag, ,}#[default]"
set -g window-status-separator " | "

# Centralizar janelas
set -g status-justify centre

# Configurar o lado direito
set -g status-right-length 80
set -g status-right "#[fg=#abb2bf] %H:%M #[fg=#56b6c2]  #[fg=#abb2bf]#(basename \"#{pane_current_path}\" | cut -c1-15)#[default]"

# Configurar intervalo de atualização
set -g status-interval 2
#=====================[ End of Statusbar Config ] ========================#


#=====================[ Tmux navigation w/ vim ] ========================#
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

#=====================[ End of Tmux navigation setup ] ========================#
